{% set name = "pyvista-xarray" %}
{% set version = "0.1.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 04ba84134a93c47ac5b8593bb31e4b6f5ad59ce72fd25100238ae96abecd5f52

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - python >={{ python_min }}
    - pyvista >=0.37
    - scooby
    - xarray >=2022.12.0

test:
  imports:
    - pvxarray
  commands:
    - pip check
    - python -c "import xarray; assert 'pyvista' in xarray.backends.list_engines()"
    - python -c "import pvxarray, xarray; da = xarray.DataArray(); assert hasattr(da, 'pyvista')"
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/pyvista/pyvista-xarray
  summary: PyVista DataArray accessors for xarray
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - banesullivan
